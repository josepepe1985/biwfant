name: Biwfant Bot

on:
  schedule:
    # Twice a day: 08:00 and 20:00 UTC
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode (no real actions)?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # bot completes well within 10 min with short confirmation window
    permissions:
      contents: write      # needed to commit SQLite DB history

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BIWENGER_EMAIL:      ${{ secrets.BIWENGER_EMAIL }}
          BIWENGER_PASSWORD:   ${{ secrets.BIWENGER_PASSWORD }}
          BIWENGER_LEAGUE_ID:  '1809775'
          BIWENGER_USER_ID:    '11444346'
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_API_KEY:         ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:        ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL:           ${{ secrets.LLM_MODEL }}
          CONFIRMATION_TIMEOUT_SECONDS: '300'  # 5 min — you get a Telegram ping, tap within 5 min or it auto-skips
          SSL_VERIFY:          'true'   # GitHub's network has valid certs
        run: python scripts/run_bot.py

      - name: Commit SQLite history
        if: always()   # commit even if bot exits with non-zero (partial data)
        run: |
          git config user.name  "biwfant-bot"
          git config user.email "bot@biwfant"
          git add data/biwfant.db || true
          git diff --staged --quiet || git commit -m "chore: update biwfant.db history [skip ci]"
          git push || true

