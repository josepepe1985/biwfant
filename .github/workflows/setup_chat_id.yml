name: Get Telegram Chat ID

on:
  workflow_dispatch:

jobs:
  get-chat-id:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install requests pydantic pydantic-settings python-dotenv loguru -q

      - name: Get chat ID
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          BIWENGER_EMAIL:     ${{ secrets.BIWENGER_EMAIL }}
          BIWENGER_PASSWORD:  ${{ secrets.BIWENGER_PASSWORD }}
          SSL_VERIFY:         'true'
          DRY_RUN:            'true'
        run: python scripts/setup_chat_id.py
