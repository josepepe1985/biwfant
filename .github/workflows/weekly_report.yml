name: Weekly Report

on:
  schedule:
    - cron: '0 10 * * 1'     # Monday 10:00 UTC

  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Send weekly report
        env:
          BIWENGER_EMAIL:      ${{ secrets.BIWENGER_EMAIL }}
          BIWENGER_PASSWORD:   ${{ secrets.BIWENGER_PASSWORD }}
          BIWENGER_LEAGUE_ID:  '1809775'
          BIWENGER_USER_ID:    '11444346'
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_API_KEY:         ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:        ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL:           ${{ secrets.LLM_MODEL }}
          DRY_RUN:             'false'
          SSL_VERIFY:          'true'
        run: python scripts/weekly_report.py

      - name: Commit updated DB (with jornada results)
        if: always()
        run: |
          git config user.name  "biwfant-bot"
          git config user.email "bot@biwfant"
          git add data/biwfant.db || true
          git diff --staged --quiet || git commit -m "chore: weekly jornada results [skip ci]"
          git push || true
